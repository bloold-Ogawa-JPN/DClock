<!DOCTYPE html>
<html lang="ja" data-color-mode="auto" data-light-theme="light" data-dark-theme="dark" data-a11y-animated-images="system" data-a11y-link-underlines="true">
<head>
    <meta charset="utf-8">
    <!-- iPhone用のビューポート固定 ＆ ホーム画面追加時のスタンドアロン起動設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LCD Clock for iPhone</title>
    
    <!-- GitHub 外部スタイルシート（Primer UI） -->
    <link crossorigin="anonymous" media="all" rel="stylesheet" href="https://githubassets.com" />
    <link crossorigin="anonymous" media="all" rel="stylesheet" href="https://githubassets.com" />
    <link crossorigin="anonymous" media="all" rel="stylesheet" href="https://githubassets.com" />
    <link crossorigin="anonymous" media="all" rel="stylesheet" href="https://githubassets.com" />
    <link crossorigin="anonymous" media="all" rel="stylesheet" href="https://githubassets.com" />
    <link crossorigin="anonymous" media="all" rel="stylesheet" href="https://githubassets.com" />
    <link crossorigin="anonymous" media="all" rel="stylesheet" href="https://githubassets.com" />

    <!-- 外部CSSの読み込み -->
    <link rel="stylesheet" href="style.css">

    <!-- 環境変数JSON -->
    <script type="application/json" id="client-env">{"locale":"en","featureFlags":[]}</script>
</head>
<body>

    <!-- 時計表示エリア -->
    <div class="clock-container" onclick="toggleFullscreen()">
        <!-- カレンダー表示（大きく・見やすく） -->
        <div class="date-display" id="date-el">----年--月--日 (ー)</div>
        
        <!-- 7セグメント物理液晶ディスプレイ構造 -->
        <div class="time-wrapper">
            <!-- AM/PM 液晶 -->
            <div class="period-display" id="period-display">AM</div>

            <!-- 時 -->
            <div class="digit" id="h1">
                <div class="seg seg-a"></div><div class="seg seg-b"></div><div class="seg seg-c"></div>
                <div class="seg seg-d"></div><div class="seg seg-e"></div><div class="seg seg-f"></div>
                <div class="seg seg-g"></div>
            </div>
            <div class="digit" id="h2">
                <div class="seg seg-a"></div><div class="seg seg-b"></div><div class="seg seg-c"></div>
                <div class="seg seg-d"></div><div class="seg seg-e"></div><div class="seg seg-f"></div>
                <div class="seg seg-g"></div>
            </div>

            <!-- コロン1 -->
            <div class="colon">
                <div class="colon-dot"></div>
                <div class="colon-dot"></div>
            </div>

            <!-- 分 -->
            <div class="digit" id="m1">
                <div class="seg seg-a"></div><div class="seg seg-b"></div><div class="seg seg-c"></div>
                <div class="seg seg-d"></div><div class="seg seg-e"></div><div class="seg seg-f"></div>
                <div class="seg seg-g"></div>
            </div>
            <div class="digit" id="m2">
                <div class="seg seg-a"></div><div class="seg seg-b"></div><div class="seg seg-c"></div>
                <div class="seg seg-d"></div><div class="seg seg-e"></div><div class="seg seg-f"></div>
                <div class="seg seg-g"></div>
            </div>

            <!-- コロン2 -->
            <div class="colon">
                <div class="colon-dot"></div>
                <div class="colon-dot"></div>
            </div>

            <!-- 秒 -->
            <div class="digit digit-sec" id="s1">
                <div class="seg seg-a"></div><div class="seg seg-b"></div><div class="seg seg-c"></div>
                <div class="seg seg-d"></div><div class="seg seg-e"></div><div class="seg seg-f"></div>
                <div class="seg seg-g"></div>
            </div>
            <div class="digit digit-sec" id="s2">
                <div class="seg seg-a"></div><div class="seg seg-b"></div><div class="seg seg-c"></div>
                <div class="seg seg-d"></div><div class="seg seg-e"></div><div class="seg seg-f"></div>
                <div class="seg seg-g"></div>
            </div>
        </div>

        <div class="guide-text">タップ：フルスクリーン切り替え / 1回タップで常時点灯ON</div>
    </div>

    <!-- タイマー設定・情報パネル -->
    <div class="feature-panel" id="timer-panel">
        <p class="panel-title">TIMER CONTROL</p>
        
        <div class="panel-row" id="timer-setup">
            <input type="number" id="timer-hours" min="0" max="23" value="0" placeholder="時"><span>:</span>
            <input type="number" id="timer-minutes" min="0" max="59" value="3" placeholder="分"><span>:</span>
            <input type="number" id="timer-seconds" min="0" max="59" value="0" placeholder="秒">
            <button class="action-btn" onclick="startTimer()">Start</button>
        </div>

        <div class="countdown-row" id="countdown-display">
            <span class="status-text" id="timer-status">Remaining...</span>
            <button class="cancel-btn" onclick="stopTimer()">Cancel</button>
        </div>
    </div>

    <!-- iPhone最適化ボトムコントロールメニュー -->
    <div class="controls-container">
        <!-- 上段 -->
        <div class="controls-row flex-wrap justify-center gap-2">
            <div class="btn-group">
                <button id="btn-12h" onclick="changeFormat('12h')">12H</button>
                <button id="btn-24h" class="active" onclick="changeFormat('24h')">24H</button>
            </div>
            
            <div class="dropdown-wrapper">
                <input type="checkbox" id="chime-toggle" checked>
                <label for="chime-toggle" class="dropdown-label">時報</label>
                <select id="chime-sound-select">
                    <option value="electronic">電子音</option>
                    <option value="bell">鐘の音</option>
                    <option value="pipipip">レトロ</option>
                </select>
            </div>

            <div class="dropdown-wrapper">
                <input type="checkbox" id="alarm-toggle" checked>
                <label for="alarm-toggle" class="dropdown-label">タイマー音</label>
            </div>
        </div>

        <!-- 下段 -->
        <div class="controls-row flex-wrap justify-center gap-2">
            <button id="theme-toggle-btn" onclick="toggleTheme()">Light</button>
            <button id="timer-toggle-btn" onclick="toggleTimerPanel()">Timer</button>
            
            <div class="color-picker-wrapper">
                <label class="dropdown-label">Color:</label>
                <input type="color" id="color-picker" value="#ff9500" oninput="changeColor(this.value)">
            </div>

            <div class="brightness-wrapper">
                <label class="dropdown-label">Bright:</label>
                <input type="range" id="brightness" min="0.2" max="1" step="0.1" value="1" oninput="changeBrightness(this.value)">
            </div>
        </div>
    </div>

    <!-- 外部JavaScriptの読み込み -->
    <script src="script.js"></script>
</body>
</html>
