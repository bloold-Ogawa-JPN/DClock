<!DOCTYPE html>
<html lang="ja" data-color-mode="dark" data-light-theme="light" data-dark-theme="dark">
<head>
    <meta charset="utf-8">

    <!-- iPhoneアプリ化のためのアイコン設定 -->
    <link rel="apple-touch-icon" href="icon.png">

    <!-- iPhoneアプリ化のための必須設定 -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                   user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="液晶時計">

    <title>液晶デジタル時計</title>

    <!-- GitHub 外部スタイルシート（Primer UI）※複数読み込みは削除 -->
    <link crossorigin="anonymous" media="all" rel="stylesheet" href="https://githubassets.com" />

    <!-- 外部CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- 環境変数JSON -->
    <script type="application/json" id="client-env">
        {"locale":"en","featureFlags":[]}
    </script>
</head>

<body>

    <!-- 時計表示エリア -->
    <div class="clock-container" onclick="toggleFullscreen()">

        <!-- カレンダー表示 -->
        <div class="date-display" id="date-el">----年--月--日 (ー)</div>

        <!-- 7セグメントディスプレイ -->
        <div class="time-wrapper">

            <!-- AM/PM -->
            <div class="period-display" id="period-display">AM</div>

            <!-- 時 -->
            <div class="digit" id="h1">
                <div class="seg seg-a"></div><div class="seg seg-b"></div><div class="seg seg-c"></div>
                <div class="seg seg-d"></div><div class="seg seg-e"></div><div class="seg seg-f"></div>
                <div class="seg seg-g"></div>
            </div>
            <div class="digit" id="h2">
                <div class="seg seg-a"></div><div class="seg seg-b"></div><div class="seg seg-c"></div>
                <div class="seg seg-d"></div><div class="seg seg-e"></div><div class="seg seg-f"></div>
                <div class="seg seg-g"></div>
            </div>

            <!-- コロン -->
            <div class="colon">
                <div class="colon-dot"></div>
                <div class="colon-dot"></div>
            </div>

            <!-- 分 -->
            <div class="digit" id="m1">
                <div class="seg seg-a">
